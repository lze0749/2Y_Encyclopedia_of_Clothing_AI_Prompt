<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>2Y Encyclopedia of Clothing AI Prompt</title>

    <meta
        name="description"
        content="AI clothing prompt encyclopedia for PixAI, Niji Journey, TensorArt and GPT Image."
    >

    <meta
        name="theme-color"
        content="#C400FF"
    >

    <link
        rel="stylesheet"
        href="./style.css"
    >

    <link
        rel="manifest"
        href="./manifest.json"
    >

    <link
        rel="icon"
        type="image/png"
        sizes="192x192"
        href="./icons/icon-192.png"
    >

    <link
        rel="apple-touch-icon"
        href="./icons/apple-touch-icon.png"
    >

    <meta
        name="apple-mobile-web-app-capable"
        content="yes"
    >

    <meta
        name="apple-mobile-web-app-status-bar-style"
        content="black-translucent"
    >

    <meta
        name="apple-mobile-web-app-title"
        content="2Y Prompt"
    >
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./library.css">
    <link rel="stylesheet" href="./builder.css">

    <script src="./builder.js" defer></script>
</head>

<body>

<header class="topbar">

    <div class="logo">
        🍮
    </div>

    <div class="title-group">
        <h1>2Y Encyclopedia of Clothing AI Prompt</h1>
        <p>Universal Prompt Library</p>
    </div>

</header>


<div class="layout">

    <aside class="sidebar">

        <input
            type="search"
            placeholder="Search..."
            class="search-box"
        >

        <nav aria-label="百科分類">
    <ul id="categoryList" class="category-list">
        <li class="loading-item">
            正在載入分類……
        </li>
    </ul>
</nav>

    </aside>


    <main class="content">

        <section class="dashboard">

    <div class="card hero">

        <h2 id="pageTitle">Welcome 👋</h2>
        <p id="pageDescription">
    Build prompts for PixAI, Niji Journey,
    TensorArt and GPT Image.
<p id="pageDescription">
    Build prompts for PixAI, Niji Journey,
    TensorArt and GPT Image.
</p>

        <button id="startButton">
            Start Building
        </button>

    </div>

    <div class="card">

        <h3>📊 Statistics</h3>

        <ul id="statsList" class="stats">
    <li>
        分類數量
        <span>載入中</span>
    </li>
</ul>

    </div>

    <div class="card">

        <h3>⭐ Quick Actions</h3>

        <button>Prompt Builder</button>

        <button>Search Library</button>

        <button>Random Prompt</button>

    </div>

</section>

    </main>

</div>

<script src="app.js"></script>

</body>
</html>
